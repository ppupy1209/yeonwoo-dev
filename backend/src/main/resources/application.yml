spring:
  application:
    name: portfolio-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/portfolio?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:portfolio}
    password: ${DB_PASSWORD:portfolio}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  rate-limit:
    writes-per-minute: ${APP_RATE_LIMIT_WRITES_PER_MINUTE:10}
